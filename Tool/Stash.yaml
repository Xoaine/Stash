# Tác giả: https://github.com/Repcz
# Kênh Telegram: https://t.me/QVQ_Channel
# Các dòng bắt đầu bằng ';' hoặc '#' hoặc '//' là chú thích

# ================ CẤU HÌNH CHÍNH ================

chế-độ: rule                 # Chế độ hoạt động: rule (chia theo quy tắc) / global (toàn bộ đi proxy) / direct (toàn bộ đi thẳng)
log-level: info              # Mức độ log: silent / error / warning / info / debug

# ================ CẤU HÌNH DNS ================
dns:
  default-nameserver: [223.5.5.5, 119.29.29.29]     # DNS để phân giải tên miền (dạng IP)
  fake-ip-filter: ['*.lan', '*.qq.com', '*.163.com', '*.music.163.com', 'localhost.*']   # Không fake IP với các miền này
  nameserver: [https://doh.pub/dns-query, https://dns.alidns.com/dns-query]              # DNS chính (DoH)

# ================ SUBSCRIPTION =================
subscribe-url: https://example.com/clash-sub.yaml   # Link hiển thị trên app Stash (bạn thay bằng link thật)

# ================ DANH SÁCH MÁY CHỦ (NODE) ================
proxy-providers:
  Subscribe:
    interval: 86400
    benchmark-timeout: 3
    benchmark-url: 'http://www.gstatic.com/generate_204'
    url: https://example.com/clash-sub.yaml          # THAY bằng link thực tế của bạn
    path: ./proxy_providers/Subscribe.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 1800

# ================ NHÓM PROXY (CHIA NHÓM CHUYÊN DỤNG) ================
proxy-groups:
  - {name: Thủ công chọn, type: select, use: [Subscribe], proxies: [🇭🇰 Hồng Kông, 🇺🇸 Mỹ, 🇸🇬 Singapore, 🇯🇵 Nhật, 🇹🇼 Đài Loan, DIRECT]}

  - {name: Quốc tế, type: select, proxies: [Thủ công chọn, 🇭🇰 Hồng Kông, 🇺🇸 Mỹ, 🇸🇬 Singapore, 🇯🇵 Nhật, 🇹🇼 Đài Loan, Tự động, DIRECT]}
  - {name: Google, type: select, proxies: [Thủ công chọn, 🇭🇰 Hồng Kông, 🇺🇸 Mỹ, 🇸🇬 Singapore, 🇯🇵 Nhật, 🇹🇼 Đài Loan, Tự động, DIRECT]}
