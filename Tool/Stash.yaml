  - {name: Bilibili, type: select, proxies: [DIRECT, 🇭🇰 Hồng Kông, 🇹🇼 Đài Loan]}
  - {name: Game, type: select, proxies: [Thủ công chọn, 🇭🇰 Hồng Kông, 🇺🇸 Mỹ, 🇸🇬 Singapore, 🇯🇵 Nhật, 🇹🇼 Đài Loan, Tự động, DIRECT]}
